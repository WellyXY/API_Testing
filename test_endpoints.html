<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endpoint Tests</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .endpoint { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🎯 Staging API Endpoint Tests</h1>
    
    <div class="test-section">
        <h2>📋 Available Endpoints</h2>
        <div class="endpoint">
            <strong>Staging v2.2:</strong> /generate/2.2/i2v
        </div>
    </div>

    <div class="test-section">
        <h2>🔧 API Configuration</h2>
        <div id="apiInfo">Loading...</div>
    </div>

    <div class="test-section">
        <h2>🧪 Test Results</h2>
        <div id="testResults"></div>
    </div>

    <script>
        // Test API config
        async function testAPIInfo() {
            try {
                const response = await fetch('/api/info');
                const data = await response.json();
                
                const apiInfo = document.getElementById('apiInfo');
                apiInfo.innerHTML = `
                    <h3>Staging API Configuration:</h3>
                    <ul>
                        <li><strong>Base URL:</strong> ${data.providers.staging.base_url}</li>
                        <li><strong>API Key:</strong> ${data.providers.staging.api_key.substring(0, 8)}...${data.providers.staging.api_key.substring(data.providers.staging.api_key.length - 8)}</li>
                        <li><strong>Supported versions:</strong> v2.2</li>
                    </ul>
                `;
            } catch (error) {
                document.getElementById('apiInfo').innerHTML = `<div class="error">❌ Failed to fetch API info: ${error.message}</div>`;
            }
        }

        // Test endpoint
        async function testEndpoint(endpointName) {
            const testResults = document.getElementById('testResults');
            try {
                const formData = new FormData();
                // Use staging v2.2
                const testImage = new File(['test'], 'test.jpg', { type: 'image/jpeg' });
                formData.append('image', testImage);
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-API-KEY': 'pk_fnOLPQFrhk96QscYG9hIUSw-Jn5ygl_ehSUWa9PvwZM'
                    }
                });
                const result = await response.json();
                if (response.ok) {
                    testResults.innerHTML += `<div class="success">✅ Test succeeded - Video ID: ${result.video_id || 'N/A'}</div>`;
                } else {
                    testResults.innerHTML += `<div class="error">❌ Test failed - ${result.message || result.error || 'Unknown error'}</div>`;
                }
            } catch (error) {
                testResults.innerHTML += `<div class="error">❌ Test error - ${error.message}</div>`;
            }
        }

        // Run tests
        async function runTests() {
            const testResults = document.getElementById('testResults');
            testResults.innerHTML = '<h3>Starting tests...</h3>';
            
            await testEndpoint('staging-v2.2');
            
            testResults.innerHTML += '<h3>✅ Tests completed</h3>';
        }

        // Run on page load
        window.onload = function() {
            testAPIInfo();
            setTimeout(runTests, 1000);
        };
    </script>
</body>
</html>
